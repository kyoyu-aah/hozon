  <link rel="stylesheet" href="./normal.css">

  <title>ものおきば</title>
  <style>
    /* リスト全体を横並びにする設定 */
    ul {
      list-style: none;
      padding: 0;
      display: flex;       /* 横並びにする */
      flex-wrap: wrap;    /* 端まで来たら折り返す */
      gap: 20px;          /* 画像ごとの隙間 */
    }

    li {
      display: flex;
      flex-direction: column; /* リンク（文字）と画像を縦に並べる */
      align-items: center;    /* 中央揃え（お好みで） */
      width: 150px;           /* 各項目の幅を固定 */
    }

    .thumbnail {
      display: block;
      margin-top: 5px;
      width: 100%;       /* 親要素(li)の幅に合わせる */
      height: auto;
      border: 1px solid #ccc;
    }

    /* 文字が長い場合に備えての調整 */
    li a {
      text-align: center;
      font-size: 0.9em;
      word-break: break-all; /* 長い駅名でも崩れないように */
      text-decoration: none;
      color: #0000EE;
    }
  </style>
</head>
