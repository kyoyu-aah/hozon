<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=yes">
  <link rel="stylesheet" href="./normal.css">
  <meta name="robots" content="noindex, nofollow">
  <title>ものおきば</title>
  <style>
    /* 画像とリストのレイアウト設定 */
    ul {
      list-style: none; /* 点を消す */
      padding: 0;
      display: flex;    /* 横並びにする */
      flex-wrap: wrap;  /* 端まで来たら折り返す */
      gap: 20px;       /* 項目間の余白 */
    }

    li {
      margin-bottom: 15px; 
      display: flex;
      flex-direction: column; /* 文字と画像を縦に並べる */
      align-items: center;    /* 中央揃え */
      width: 130px;           /* 各項目の幅を固定 */
    }

    /* 画像のサイズ調整 */
    .thumb {
      display: block;
      margin-top: 8px;
      width: 100%;       /* 親要素の幅に合わせる */
      max-width: 120px;  /* 最大幅を指定 */
      height: auto;      /* 縦横比を維持 */
      border: 1px solid #ddd;
      border-radius: 4px; /* 角を少し丸く */
    }

    /* リンクテキストの調整 */
    li a {
      text-align: center;
      font-size: 14px;
      text-decoration: none;
      min-height: 2.5em; /* 高さを揃えて画像の開始位置を統一 */
      display: flex;
      align-items: center;
    }
  </style>
</head>
<body>
  <h3>ものおきば</h3>
  <p>最終更新：2025/5/31 22:45</p>
  <ul>
    <li><a href="2.jpg">千葉</a><img src="2.jpg" class="thumb"></li>
    <li><a href="1.jpg">船橋</a><img src="1.jpg" class="thumb"></li>
    <li><a href="3.jpg">船橋</a><img src="3.jpg" class="thumb"></li>
    <li><a href="4.jpg">船橋</a><img src="4.jpg" class="thumb"></li>
    <li><a href="5.jpg">船橋</a><img src="5.jpg" class="thumb"></li>
    <li><a href="6.jpg">船橋</a><img src="6.jpg" class="thumb"></li>
    <li><a href="7.jpg">船橋</a><img src="7.jpg" class="thumb"></li>    
  </ul>
</body>
</html>
